---
apiVersion: galaxy.ansible.com/v1beta1
kind: Galaxy
metadata:
  name: galaxy
  namespace: galaxy
spec:
  # Test CA Bundle
  # bundle_cacert_secret: my-custom-certs
  # route_tls_secret: galaxy-tls
  


  # ingress_type: nodeport
  # nodeport_port: 32002
  ingress_type: Route
  deployment_type: galaxy

  # image: quay.io/ansible/galaxy-ng
  # image_version: ca129936
  # image_web: quay.io/ansible/galaxy-ui
  # image_web_version: 1609f5f0

  # Downstream images
  # image: brew.registry.redhat.io/rh-osbs/ansible-automation-platform-24-hub-rhel8
  # image_version: 4.7.3
  # image_web: brew.registry.redhat.io/rh-osbs/ansible-automation-platform-24-hub-web-rhel8
  # image_web_version: 4.7.3

  # Old images: AAP 2.4 and prior
  # image: quay.io/pulp/galaxy-minimal
  # image_version: 4.7.1

  # image: quay.io/chadams/galaxy-minimal
  # image_version: 4.7.1-patched
  # image_web: quay.io/pulp/galaxy-web
  # image_web_version: 4.7.1


  #image: quay.io/ansible-ci/galaxy-ng
  #image_version: add-galaxy-operator-support
  #image_web: quay.io/ansible/galaxy-ui
  #image_web_version: latest

  image_pull_policy: Always
  no_log: false

  # signing configuration
  signing_secret: "signing-galaxy"
  signing_scripts_configmap: "signing-scripts"

  # admin_password_secret: admin-password-secret

  #object_storage_azure_secret: automation-hub-azurite
  #storage_type: Azure

  storage_type: File

  # k3s local-path requires this
  file_storage_access_mode: "ReadWriteMany"
  # # We have a little over 10GB free on GHA VMs/instances
  file_storage_size: "10Gi"
  file_storage_storage_class: nfs-local-rwx
  
  pulp_settings:
    api_root: "/api/galaxy/pulp/"
    allowed_export_paths:
      - /tmp
    allowed_import_paths:
      - /tmp
    telemetry: false
